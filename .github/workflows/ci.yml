name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup frontend cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Cypress
            admin-web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('admin-web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build and test
        run: mvn --batch-mode verify -DskipTests=false
