name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: admin-web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: admin-web
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: admin-web
        continue-on-error: true
        run: pnpm run lint

      - name: Type-check and format-check frontend
        working-directory: admin-web
        run: |
          pnpm run type-check
          pnpm run format:check

      - name: Run frontend tests with coverage
        working-directory: admin-web
        run: pnpm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: admin-web/coverage

      - name: Build frontend
        working-directory: admin-web
        run: pnpm run build

      - name: Setup Maven cache
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test
        run: mvn --batch-mode verify -DskipTests=false -Dskip.frontend.build=true

  windows-package:
    needs: test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install frontend dependencies
        working-directory: admin-web
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: admin-web
        continue-on-error: true
        run: pnpm run lint

      - name: Type-check and format-check frontend
        working-directory: admin-web
        run: |
          pnpm run type-check
          pnpm run format:check

      - name: Build frontend
        working-directory: admin-web
        run: pnpm run build

      - name: Setup Maven cache
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build uber-jar
        run: mvn --batch-mode package "-DskipTests" "-Dskip.frontend.build=true" "-Dquarkus.package.jar.type=uber-jar"
        env:
          MAVEN_OPTS: -Duser.home=%USERPROFILE%

      - name: Package Windows installer
        run: |
          $jar = Get-ChildItem target\*runner.jar | Select-Object -First 1
          $version = $jar.Name -replace '^.*-(\d+\.\d+\.\d+)-runner\.jar$', '$1'
          & "$env:JAVA_HOME\bin\jpackage.exe" --name damning-proxy --input target --main-jar $jar.Name --win-console --type exe --java-options "-Duser.home=%APPDATA%" --dest dist --app-version $version
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: damning-proxy-windows
          path: dist/*.exe
