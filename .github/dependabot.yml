version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 100
    labels:
      - dependencies
      - java

  - package-ecosystem: npm
    directory: /admin-web
    schedule:
      interval: weekly
    open-pull-requests-limit: 100
    labels:
      - dependencies
      - javascript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
