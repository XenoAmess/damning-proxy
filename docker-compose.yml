services:
  damning-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: damning-proxy:latest
    container_name: damning-proxy
    ports:
      - "12360:12360"
    volumes:
      - damning-data:/data
    environment:
      - JAVA_OPTS=-Duser.home=/data -XX:MaxRAMPercentage=75.0
    restart: unless-stopped
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  damning-data:
