quarkus.application.name=daming-proxy
quarkus.http.port=12360

# Datasource (H2 for local dev, abstracted for future PG/MySQL)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:${user.home}/.daming-proxy/data;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# Enable CORS for OpenCode client and admin UI
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.xenoamess.daming_proxy".level=DEBUG

# Native image hints
quarkus.native.additional-build-args=-H:+ReportExceptionStackTraces

# Proxy settings
# Default upstream connection timeout in milliseconds
daming-proxy.default-timeout-ms=30000
