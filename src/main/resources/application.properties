quarkus.application.name=damning-proxy
quarkus.http.port=12360
quarkus.http.host=0.0.0.0

# Datasource (H2 for local dev, abstracted for future PG/MySQL)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:${user.home}/.damning-proxy/data;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

quarkus.http.limits.max-body-size=100M
quarkus.http.limits.max-form-attribute-size=100M
quarkus.http.limits.max-form-urlencoded-buffer-size=100M
quarkus.http.limits.max-chunk-size=100M

# Enable CORS for OpenCode client and admin UI
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.xenoamess.damning_proxy".level=DEBUG

# Native image hints
quarkus.native.additional-build-args=-H:+ReportExceptionStackTraces

# Proxy settings
# Default upstream connection timeout in milliseconds
damning-proxy.default-timeout-ms=30000

# Upstream retry settings (exponential backoff: base * 2^attempt, capped at max-delay)
damning-proxy.upstream.max-retries=0
damning-proxy.upstream.retry-base-delay-ms=100
damning-proxy.upstream.retry-max-delay-ms=5000
damning-proxy.upstream.retry-status-codes=500,502,503,504
damning-proxy.upstream.retry-on-timeout=true

# Traffic log truncation limits (in characters). Use -1 to disable truncation.
damning-proxy.log.max-body-length=-1
damning-proxy.log.max-headers-length=-1
damning-proxy.log.max-plugin-logs-length=-1
damning-proxy.log.max-friendly-snapshots-length=-1

# Plugin ZIP package limits
damning-proxy.plugin.zip.max-size-bytes=10485760
damning-proxy.plugin.zip.max-entries=100
damning-proxy.plugin.zip.max-entry-size-bytes=1048576
